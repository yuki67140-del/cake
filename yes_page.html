</div>

<audio id="music" loop>
  <source src="./music1" type="audio/mpeg">
</audio>

<script>
  const playBtn = document.getElementById("playBtn");
  const music = document.getElementById("music");

  let isPlaying = false;

  playBtn.addEventListener("click", function () {
    if (isPlaying) {
      music.pause();
      isPlaying = false;
    } else {
      music.play();
      isPlaying = true;
    }
  });
</script>
